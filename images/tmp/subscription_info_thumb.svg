<svg width="386" height="312" viewBox="0 0 386 312" fill="none" xmlns="http://www.w3.org/2000/svg">
									<style>
									    /* Анимация расширяющегося круга (эффект ripple/pulse) */
									    .pulse-circle {
									        transform-origin: 179px 161px;
									        animation: pulse 3s cubic-bezier(0.25, 0.46, 0.45, 0.94) infinite;
									    }

									    @keyframes pulse {
									        0% { transform: scale(1); opacity: 1; }
									        /* 150 (радиус большого круга) / 82.1168 (малого) ≈ 1.8267 */
									        100% { transform: scale(1.8267); opacity: 0; }
									    }

									    /* Анимация всплывающих карточек (не одновременное появление) */
									    .card-1 { animation: float-cycle 6s ease-in-out infinite; animation-delay: 0s; }
									    .card-2 { animation: float-cycle 6s ease-in-out infinite; animation-delay: 2s; }
									    .card-3 { animation: float-cycle 6s ease-in-out infinite; animation-delay: 4s; }

									    @keyframes float-cycle {
									        0% { opacity: 0; transform: translateY(15px); }
									        10%, 40% { opacity: 1; transform: translateY(0); }
									        50%, 100% { opacity: 0; transform: translateY(-15px); }
									    }
									</style>

									<!-- Фоновые круги -->
									<circle cx="179.918" cy="161.753" r="150" fill="#F0F2FF"/>
									<!-- Статичный малый круг (чтобы центр не "оголялся" при расширении анимации) -->
									<circle cx="179.918" cy="161.753" r="82.1168" fill="#E2E5FF"/>
									<!-- Анимированный уходящий малый круг -->
									<circle class="pulse-circle" cx="179.918" cy="161.753" r="82.1168" fill="#E2E5FF"/>

