<svg width="350" height="199" viewBox="0 0 350 199" fill="none" xmlns="http://www.w3.org/2000/svg">
									<style>
									    /* Анимация движения карточек */
									    .card {
									        animation: cardSlide 6s ease-in-out infinite;
									    }
									    
									    /* Сдвиг во времени для обеспечения бесшовного конвейера */
									    .c1, .c1 .unprocessed, .c1 .processed { animation-delay: 0s; }
									    .c2, .c2 .unprocessed, .c2 .processed { animation-delay: -1.5s; }
									    .c3, .c3 .unprocessed, .c3 .processed { animation-delay: -3.0s; }
									    .c4, .c4 .unprocessed, .c4 .processed { animation-delay: -4.5s; }

									    /* Анимация исчезновения серого вопроса */
									    .unprocessed {
									        animation: unprocFade 6s ease-in-out infinite;
									    }
									    /* Анимация появления синей молнии + галочки */
									    .processed {
									        animation: procFade 6s ease-in-out infinite;
									    }

									    /* Ключевые кадры для движения карточки (подъем шаг за шагом) */
									    @keyframes cardSlide {
									        0%, 5% { transform: translateY(240px); opacity: 0; }           /* Ожидание снизу */
									        15%, 35% { transform: translateY(160px); opacity: 1; }         /* Заняла нижнюю позицию */
									        45%, 60% { transform: translateY(80px); opacity: 1; }          /* Заняла центральную позицию */
									        70%, 85% { transform: translateY(0px); opacity: 1; }           /* Поднимается вверх (здесь выполнится) */
									        95%, 100% { transform: translateY(-80px); opacity: 0; }        /* Уходит вверх и растворяется */
									    }

									    /* Фейд: Серые элементы скрываются, как только карточка достигает самого верха */
									    @keyframes unprocFade {
									        0%, 60% { opacity: 1; transform: scale(1); }
									        65%, 100% { opacity: 0; transform: scale(0.95); }
									    }

									    /* Фейд: Цветные элементы появляются к моменту фиксации карточки наверху */
									    @keyframes procFade {
									        0%, 60% { opacity: 0; transform: scale(0.95); }
									        65%, 100% { opacity: 1; transform: scale(1); }
									    }
									</style>

									<defs>
									    <!-- Градиент переведен в <defs> чтобы работать на всех копиях карточек -->
									    <linearGradient id="paint0_linear_8010_224" x1="55" y1="35" x2="15" y2="35" gradientUnits="userSpaceOnUse">
									        <stop stop-color="#5F73FE"/>
									        <stop offset="1" stop-color="#798AFF" stop-opacity="0.894118"/>
									    </linearGradient>
									    
									    <clipPath id="cards-clip">
									        <rect x="0" y="0" width="350" height="199" />
									    </clipPath>
									</defs>

