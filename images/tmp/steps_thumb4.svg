									</g>

									<!-- Центральная подложка и столбики графиков -->
									<g class="bg-inner">
									    <path d="M39 30.413C39 23.4688 45.9688 18.6868 52.4482 21.1848L201.442 78.6283C203.732 79.5111 206.268 79.5111 208.558 78.6283L357.552 21.1848C364.031 18.6868 371 23.4688 371 30.413V255.11C371 260.572 366.572 265 361.11 265H48.8903C43.428 265 39 260.572 39 255.11V30.413Z" fill="white"/>
