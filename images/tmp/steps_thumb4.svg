<svg width="410" height="209" viewBox="0 0 410 209" fill="none" xmlns="http://www.w3.org/2000/svg">
									<style>
									    /* Анимация дальних фоновых полей */
									    .bg-outer {
									        opacity: 0;
									        animation: fadeOuter 6s ease-in-out infinite;
									    }
									    
									    /* Анимация центральной плашки и всех столбцов */
									    .bg-inner {
									        opacity: 0;
									        animation: fadeInner 6s ease-in-out infinite;
									    }
									    
									    /* Анимация появления контейнера с шестеренкой */
									    .gear-container {
									        opacity: 0;
									        transform-origin: 204px 79px; /* Центр синего квадрата: x=172+32, y=47+32 */
									        animation: popupGear 6s ease-in-out infinite;
									    }
									    
									    /* Отдельная анимация именно для вращения самой шестеренки */
									    .gear-icon {
									        transform-origin: 204px 79px;
									        /* cubic-bezier дает красивую задержку на старте и плавное торможение */
									        animation: spinGear 6s cubic-bezier(0.4, 0, 0.2, 1) infinite;
									    }

									    /* === КЛЮЧЕВЫЕ КАДРЫ === */
									    
									    @keyframes fadeOuter {
									        0%, 100% { opacity: 0; }
									        10%, 90% { opacity: 1; }
									    }

									    @keyframes fadeInner {
									        0%, 5%, 95%, 100% { opacity: 0; transform: translateY(10px); }
									        15%, 85% { opacity: 1; transform: translateY(0); }
									    }

									    @keyframes popupGear {
									        0%, 15%, 85%, 100% { opacity: 0; transform: scale(0.5); }
									        25%, 75% { opacity: 1; transform: scale(1); }
									    }

									    @keyframes spinGear {
									        0%, 25% { transform: rotate(0deg); }
									        75%, 100% { transform: rotate(720deg); } /* Два полных оборота */
									    }
									</style>

									<!-- Боковые фоновые фигуры -->
