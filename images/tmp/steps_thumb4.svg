									    <rect x="196" y="47" width="20" height="286" rx="10" fill="url(#paint2_linear_8010_223)"/>
									    <rect x="244" y="146" width="15" height="187" rx="7.5" fill="#F6F6F8"/>
									    <rect x="287" y="100" width="15" height="233" rx="7.5" fill="#F6F6F8"/>
									    <rect x="330" y="62" width="15" height="271" rx="7.5" fill="#F6F6F8"/>
									</g>

