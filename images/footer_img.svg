<svg width="906" height="638" viewBox="0 0 906 638" fill="none" xmlns="http://www.w3.org/2000/svg">
<style>
    /* Анимация большой карточки */
    /*.big-card {
        animation: fadeCardBig 8s cubic-bezier(0.4, 0, 0.2, 1) infinite;
    }*/
    /* Анимация маленькой карточки (появляется с задержкой) */
    /*.small-card {
        animation: fadeCardSmall 8s cubic-bezier(0.4, 0, 0.2, 1) infinite;
    }*/
    /* Анимация курсора и синей плашки */
    .cursor-group2 {
        animation: moveCursor2 12s cubic-bezier(0.4, 0, 0.2, 1) infinite;
    }

    /*@keyframes fadeCardBig {
        0%, 5% { opacity: 0; transform: translateY(15px); }
        15%, 85% { opacity: 1; transform: translateY(0); }
        95%, 100% { opacity: 0; transform: translateY(15px); }
    }

    @keyframes fadeCardSmall {
        0%, 15% { opacity: 0; transform: translateY(15px); }
        25%, 85% { opacity: 1; transform: translateY(0); }
        95%, 100% { opacity: 0; transform: translateY(15px); }
    }*/

    @keyframes moveCursor2 {
        /* Появление снизу */
        0%, 10% { opacity: 1; transform: translate(-20px, -80px); }
        /* Приземление на иконку большой карточки */
        25% { opacity: 1; transform: translate(-147px, -263px); } 
        /* Ожидание... */
        40% { opacity: 1; transform: translate(-147px, -263px); } 
        /* Плавный переезд к иконке мелкой карточки */
        60% { opacity: 1; transform: translate(-309px, 22px); } 
        /* Ожидание... */
        70%, 80% { opacity: 1; transform: translate(-309px, 22px); }
        /* Выскальзывание вниз и исчезновение перед новым циклом */
        90%, 100% { opacity: 1; transform: translate(-20px, -80px); } 
    }
</style>

